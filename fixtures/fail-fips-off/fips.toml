[target]
certificate = "4816"
module      = "aws-lc-fips"
version     = "AWS-LC-FIPS-2.0"
allowed_oes = ["x86_64-unknown-linux-gnu", "aarch64-unknown-linux-gnu"]
strictness  = "tested-only"

[policy]
forbid_competing_crypto = true
allowed_backends        = ["aws-lc-rs"]
deny_off_certificate_oe = true

[registry]
source = "builtin"
