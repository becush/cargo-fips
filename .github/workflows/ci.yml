name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # The exact same gate developers run locally — scripts/preflight.sh — so local
  # and CI run byte-for-byte the same checks: rustfmt --check, clippy -D warnings,
  # cargo test --workspace, and the offline oe/guard exit-code assertions.
  preflight:
    name: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: ./scripts/preflight.sh
        run: ./scripts/preflight.sh

  # CI-only coverage that needs network or external tools and therefore isn't in
  # the local preflight gate: the networked subcommands (init/check/attest, which
  # run `cargo metadata`), CycloneDX schema validation, and cosign sign/verify.
  e2e:
    name: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-fips
        run: cargo install --path crates/cargo-fips

      - name: init scaffolds a fips.toml from the graph
        run: |
          cargo fips init --manifest-path fixtures/pass-aws-lc-fips/Cargo.toml \
            --output /tmp/fips.gen.toml
          cat /tmp/fips.gen.toml
          grep -q 'certificate = "4816"' /tmp/fips.gen.toml
          grep -q '"aws-lc-rs"' /tmp/fips.gen.toml

      - name: PASS fixture must exit 0
        run: cargo fips check --manifest-path fixtures/pass-aws-lc-fips/Cargo.toml

      - name: FIPS-off fixture must exit 1
        run: |
          set +e
          cargo fips check --manifest-path fixtures/fail-fips-off/Cargo.toml
          code=$?
          set -e
          echo "exit code: $code"
          test "$code" -eq 1

      - name: competing-crypto fixture must exit 1
        run: |
          set +e
          cargo fips check --manifest-path fixtures/fail-competing-crypto/Cargo.toml
          code=$?
          set -e
          echo "exit code: $code"
          test "$code" -eq 1

      - name: missing fips.toml must exit 2
        run: |
          set +e
          cargo fips check --manifest-path crates/cargo-fips/Cargo.toml
          code=$?
          set -e
          echo "exit code: $code"
          test "$code" -eq 2

      - name: attest emits a valid CycloneDX 1.6 CBOM
        run: |
          cargo fips attest \
            --manifest-path fixtures/pass-aws-lc-fips/Cargo.toml \
            --output /tmp/attestation.cdx.json
          python3 - <<'PY'
          import json
          d = json.load(open("/tmp/attestation.cdx.json"))
          assert d["bomFormat"] == "CycloneDX", d["bomFormat"]
          assert d["specVersion"] == "1.6", d["specVersion"]
          assert len(d["components"]) >= 2, "expected module + algorithms"
          assert d["serialNumber"].startswith("urn:uuid:")
          print("CBOM ok:", len(d["components"]), "components")
          PY

      - name: validate CBOM against the CycloneDX 1.6 schema
        run: |
          python3 -m venv /tmp/cdxenv
          /tmp/cdxenv/bin/pip install --quiet 'cyclonedx-python-lib[json-validation]'
          /tmp/cdxenv/bin/python - <<'PY'
          from cyclonedx.schema import SchemaVersion
          from cyclonedx.validation.json import JsonStrictValidator
          data = open("/tmp/attestation.cdx.json").read()
          err = JsonStrictValidator(SchemaVersion.V1_6).validate_str(data)
          assert err is None, f"CBOM failed CycloneDX 1.6 schema validation: {err!r}"
          print("CBOM is CycloneDX 1.6 schema-valid")
          PY

      - name: install cosign
        uses: sigstore/cosign-installer@v3

      - name: sign + verify the CBOM with cosign (key-based, offline)
        run: |
          cd /tmp
          COSIGN_PASSWORD="" cosign generate-key-pair
          COSIGN_PASSWORD="" cargo fips attest \
            --manifest-path "$GITHUB_WORKSPACE/fixtures/pass-aws-lc-fips/Cargo.toml" \
            --output /tmp/signed.cdx.json --sign --cosign-key /tmp/cosign.key
          cosign verify-blob --key /tmp/cosign.pub \
            --signature /tmp/signed.cdx.json.sig \
            --insecure-ignore-tlog /tmp/signed.cdx.json
          echo "cosign signature verified"
